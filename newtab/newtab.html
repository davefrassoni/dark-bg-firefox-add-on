<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Tab</title>
    <link rel="stylesheet" href="newtab.css">
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="shell">
      <p class="eyebrow">Dark Background Anti-Flash</p>
      <h1 id="clock">--:--</h1>
      <p class="hint">Your tab starts dark to avoid bright flashes in low-light rooms.</p>
      <div class="actions">
        <button id="openOptions">Customize</button>
      </div>
    </main>

    <script src="newtab.js"></script>
  </body>
</html>

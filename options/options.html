<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dark Background Anti-Flash Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="panel">
      <h1>Dark Background Anti-Flash</h1>
      <p class="subtitle">
        Configure preload color, page-load and tab-switch transitions, and bright-page detection.
      </p>

      <form id="settings-form">
        <section class="section">
          <h2>Base Guard</h2>
          <label class="switch">
            <input type="checkbox" id="applyOnAllPages">
            <span>Apply on all websites</span>
          </label>

          <div class="field-grid">
            <label for="preloadColor">Preload dark color</label>
            <div class="color-pair">
              <input type="color" id="preloadColor">
              <input type="text" id="preloadColorText" inputmode="text" spellcheck="false">
            </div>
          </div>
        </section>

        <section class="section">
          <h2>Page Load Transition</h2>
          <div class="field-grid">
            <label for="transitionDurationMs">Transition duration (ms)</label>
            <input type="number" id="transitionDurationMs" min="0" max="10000" step="50">
          </div>

          <div class="field-grid">
            <label for="initialHoldMs">Delay before transition (ms)</label>
            <input type="number" id="initialHoldMs" min="0" max="5000" step="20">
          </div>
        </section>

        <section class="section">
          <h2>Tab Switch Transition</h2>
          <label class="switch">
            <input type="checkbox" id="tabSwitchTransitionEnabled">
            <span>Apply transition when returning to a tab</span>
          </label>

          <div class="field-grid">
            <label for="tabSwitchTransitionDurationMs">Transition duration (ms)</label>
            <input type="number" id="tabSwitchTransitionDurationMs" min="0" max="10000" step="50">
          </div>

          <div class="field-grid">
            <label for="tabSwitchInitialHoldMs">Delay before transition (ms)</label>
            <input type="number" id="tabSwitchInitialHoldMs" min="0" max="5000" step="20">
          </div>
        </section>

        <section class="section">
          <h2>Bright Page Detection</h2>
          <div class="field-grid">
            <label for="brightnessThreshold">Brightness threshold (0-255)</label>
            <input type="number" id="brightnessThreshold" min="0" max="255" step="1">
          </div>
        </section>

        <section class="section">
          <h2>Exclusions</h2>
          <label for="excludedHosts">
            Skip selected hostnames (one per line)
          </label>
          <textarea
            id="excludedHosts"
            rows="5"
            placeholder="example.com&#10;news.example.org"
          ></textarea>
        </section>

        <div class="actions">
          <button type="submit" class="primary">Save Settings</button>
          <button type="button" id="resetDefaults">Reset Defaults</button>
          <span id="status" role="status" aria-live="polite"></span>
        </div>
      </form>
    </main>

    <script src="options.js"></script>
  </body>
</html>
